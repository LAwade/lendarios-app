version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lendarios_app
    command: php-fpm
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - lendarios_network

  web:
    image: nginx:alpine
    container_name: lendarios_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lendarios_network

  db:
    image: postgres:15-alpine
    container_name: lendarios_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - lendarios_db_data:/var/lib/postgresql/data
    networks:
      - lendarios_network

  node:
    image: node:20
    container_name: lendarios_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    tty: true
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - lendarios_network

networks:
  lendarios_network:
    driver: bridge

volumes:
  lendarios_db_data:
